<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimeGif | API Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mdi/font@latest/css/materialdesignicons.min.css">
    <style>
        :root { --bg: #0b0e14; --sidebar: #151921; --accent: #72a9e8; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: #fff; display: flex; }
        .sidebar { width: 260px; height: 100vh; background: var(--sidebar); position: sticky; top: 0; transition: 0.3s; border-right: 1px solid #252a35; }
        .sidebar.collapsed { width: 0; overflow: hidden; }
        .logo { padding: 30px; font-weight: bold; font-size: 22px; color: var(--accent); border-bottom: 1px solid #252a35; }
        .nav-menu { list-style: none; padding: 10px; margin: 0; }
        .nav-item { padding: 15px 20px; cursor: pointer; border-radius: 8px; margin-bottom: 5px; display: flex; align-items: center; gap: 15px; color: #a4a9b5; }
        .nav-item.active, .nav-item:hover { background: #252a35; color: #fff; }
        .main-wrapper { flex: 1; }
        .navbar { background: var(--sidebar); padding: 15px 25px; display: flex; align-items: center; gap: 20px; border-bottom: 1px solid #252a35; }
        .menu-toggle { background: none; border: none; color: #fff; font-size: 22px; cursor: pointer; }
        .page { display: none; padding: 25px; }
        .page.active { display: block; }
        .scroll-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; }
        .scroll-grid img { width: 100%; border-radius: 12px; border: 1px solid #252a35; }
        .controls { display: flex; gap: 10px; margin-bottom: 20px; }
        select { background: #252a35; color: #fff; border: 1px solid #30363d; padding: 12px; border-radius: 8px; flex: 1; outline: none; }
        .btn-action { background: #ff4757; color: #fff; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .single-viewer img { max-width: 100%; border-radius: 15px; display: block; margin: auto; }
    </style>
</head>
<body>

    <nav class="sidebar" id="sidebar">
        <div class="logo">ANIMEGIF</div>
        <ul class="nav-menu">
            <li class="nav-item active" onclick="showPage('home')"><i class="mdi mdi-home"></i> Home</li>
            <li class="nav-item" onclick="showPage('nsfw')"><i class="mdi mdi-incognito"></i> NSFW</li>
        </ul>
    </nav>

    <div class="main-wrapper">
        <header class="navbar">
            <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
            <h2 id="page-title">Home</h2>
        </header>

        <section id="page-home" class="page active">
            <div id="scroll-container" class="scroll-grid"></div>
        </section>

        <section id="page-nsfw" class="page">
            <div class="controls">
                <select id="nsfw-cats">
                    <option value="waifu">waifu</option>
                    <option value="neko">neko</option>
                    <option value="trap">trap</option>
                    <option value="blowjob">blowjob</option>
                </select>
                <button class="btn-action" onclick="fetchNsfw()">Get Image</button>
            </div>
            <div class="single-viewer">
                <img id="nsfw-display" src="" alt="">
            </div>
        </section>
    </div>

    <script>
        let isFetching = false;

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('collapsed'); }

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById('page-' + pageId).classList.add('active');
            document.getElementById('page-title').innerText = pageId.toUpperCase();
            if(pageId === 'home' && !document.getElementById('scroll-container').hasChildNodes()) loadBatch();
        }

        async function loadBatch() {
            if (isFetching) return;
            isFetching = true;
            try {
                // Must use POST for multiple images
                const res = await fetch('/api/get-waifu?type=sfw&cat=waifu', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({})
                });
                const data = await res.json();
                const container = document.getElementById('scroll-container');
                if (data.files) {
                    data.files.forEach(url => {
                        const img = document.createElement('img');
                        img.src = url;
                        container.appendChild(img);
                    });
                }
            } catch (e) { console.error("Home grid failed"); }
            isFetching = false;
        }

        async function fetchNsfw() {
            const cat = document.getElementById('nsfw-cats').value;
            try {
                // GET is fine for single images
                const res = await fetch(`/api/get-waifu?type=nsfw&cat=${cat}`);
                const data = await res.json();
                if (data.url) document.getElementById('nsfw-display').src = data.url;
            } catch (e) { console.error("NSFW failed"); }
        }

        window.addEventListener('scroll', () => {
            if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 800) {
                if(document.getElementById('page-home').classList.contains('active')) loadBatch();
            }
        });

        window.onload = loadBatch;
    </script>
</body>
</html>
