<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimeGif | Premium Console</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mdi/font@latest/css/materialdesignicons.min.css">
    <style>
        :root { --bg: #0d1117; --sidebar: #161b22; --accent: #58a6ff; --card-bg: #21262d; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #c9d1d9; display: flex; }
        
        /* Sidebar Glassmorphism */
        .sidebar { width: 260px; height: 100vh; background: var(--sidebar); position: sticky; top: 0; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); border-right: 1px solid #30363d; }
        .sidebar.collapsed { width: 0; overflow: hidden; }
        .logo { padding: 30px; font-weight: 900; font-size: 24px; color: var(--accent); letter-spacing: 2px; }
        
        .nav-menu { list-style: none; padding: 10px; }
        .nav-item { padding: 14px 20px; cursor: pointer; border-radius: 10px; margin-bottom: 8px; display: flex; align-items: center; gap: 15px; transition: 0.3s; color: #8b949e; }
        .nav-item.active, .nav-item:hover { background: var(--card-bg); color: #fff; transform: translateX(5px); }

        .main-wrapper { flex: 1; min-width: 0; }
        .navbar { background: rgba(22, 27, 34, 0.8); backdrop-filter: blur(10px); padding: 15px 25px; display: flex; align-items: center; gap: 20px; border-bottom: 1px solid #30363d; position: sticky; top: 0; z-index: 10; }
        .menu-toggle { background: none; border: none; color: #fff; font-size: 24px; cursor: pointer; }

        .page { display: none; padding: 30px; }
        .page.active { display: block; }

        /* IMAGE ANIMATION - The 1-5s reveal */
        .scroll-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .scroll-grid img { 
            width: 100%; 
            border-radius: 16px; 
            border: 1px solid #30363d;
            background: #161b22;
            opacity: 0;
            filter: blur(10px);
            animation: reveal 1.5s ease-out forwards;
        }

        @keyframes reveal {
            0% { opacity: 0; filter: blur(20px); transform: translateY(20px); }
            100% { opacity: 1; filter: blur(0px); transform: translateY(0px); }
        }

        /* Staggered load effect (different delays for items) */
        .scroll-grid img:nth-child(2n) { animation-delay: 0.2s; }
        .scroll-grid img:nth-child(3n) { animation-delay: 0.4s; }

        .controls { display: flex; gap: 15px; margin-bottom: 30px; background: var(--card-bg); padding: 20px; border-radius: 12px; border: 1px solid #30363d; }
        select { background: #0d1117; color: #fff; border: 1px solid #30363d; padding: 12px; border-radius: 8px; flex: 1; }
        .btn-action { background: var(--accent); color: #fff; border: none; padding: 12px 30px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-action:hover { filter: brightness(1.2); box-shadow: 0 0 15px var(--accent); }

        /* Docs View */
        .docs-card { background: var(--card-bg); padding: 25px; border-radius: 12px; border: 1px solid #30363d; line-height: 1.8; }
    </style>
</head>
<body>

    <nav class="sidebar" id="sidebar">
        <div class="logo">ANIMEGIF</div>
        <ul class="nav-menu">
            <li class="nav-item active" onclick="showPage('home')"><i class="mdi mdi-compass"></i> Discover</li>
            <li class="nav-item" onclick="showPage('nsfw')"><i class="mdi mdi-lock-open"></i> Restricted</li>
            <li class="nav-item" onclick="showPage('docs')"><i class="mdi mdi-console"></i> API Console</li>
        </ul>
    </nav>

    <div class="main-wrapper">
        <header class="navbar">
            <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
            <h2 id="page-title" style="margin:0; font-size: 20px;">Discover</h2>
        </header>

        <section id="page-home" class="page active">
            <div id="scroll-container" class="scroll-grid"></div>
        </section>

        <section id="page-nsfw" class="page">
            <div class="controls">
                <select id="nsfw-cats">
                    <option value="waifu">Waifu Class</option>
                    <option value="neko">Neko Class</option>
                    <option value="trap">Trap</option>
                    <option value="blowjob">Special</option>
                </select>
                <button class="btn-action" onclick="fetchNsfwBatch()">Load 7 Images</button>
            </div>
            <div id="nsfw-container" class="scroll-grid">
                </div>
        </section>

        <section id="page-docs" class="page">
            <div class="docs-card">
                <h2>AnimeGif Engine v2.0</h2>
                <p>Status: <span style="color:var(--success)">● Online</span></p>
                <code>POST /api/get-waifu?type=sfw&cat=waifu</code>
            </div>
        </section>
    </div>

    <script>
        let isFetching = false;

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('collapsed'); }

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById('page-' + pageId).classList.add('active');
            document.getElementById('page-title').innerText = pageId.charAt(0).toUpperCase() + pageId.slice(1);
            if(pageId === 'home' && !document.getElementById('scroll-container').hasChildNodes()) loadBatch();
        }

        async function loadBatch() {
            if (isFetching) return;
            isFetching = true;
            try {
                const res = await fetch('/api/get-waifu?type=sfw&cat=waifu', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'}
                });
                const data = await res.json();
                const container = document.getElementById('scroll-container');
                if (data.files) {
                    data.files.forEach(url => {
                        const img = document.createElement('img');
                        img.src = url;
                        container.appendChild(img);
                    });
                }
            } catch (e) { console.error("Load failed"); }
            isFetching = false;
        }

        // NEW: Loads 7 images at once for NSFW
        async function fetchNsfwBatch() {
            const cat = document.getElementById('nsfw-cats').value;
            const container = document.getElementById('nsfw-container');
            container.innerHTML = ''; // Clear old ones
            
            try {
                const res = await fetch(`/api/get-waifu?type=nsfw&cat=${cat}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'}
                });
                const data = await res.json();
                if (data.files) {
                    // We only take 7 from the 30 returned
                    data.files.slice(0, 7).forEach(url => {
                        const img = document.createElement('img');
                        img.src = url;
                        container.appendChild(img);
                    });
                }
            } catch (e) { console.error("NSFW Batch failed"); }
        }

        window.addEventListener('scroll', () => {
            if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 800) {
                if(document.getElementById('page-home').classList.contains('active')) loadBatch();
            }
        });

        window.onload = loadBatch;
    </script>
</body>
</html>
